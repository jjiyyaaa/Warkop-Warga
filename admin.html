<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Warkop Warga</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: "#7A9678" } } } }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900 font-sans">
  <!-- Header -->
  <div class="bg-primary text-white shadow-xl sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i data-lucide="coffee" class="w-8 h-8 opacity-90"></i>
        <div>
          <h1 class="text-xl sm:text-2xl font-black tracking-tight">Admin Dashboard</h1>
          <p class="text-xs sm:text-sm font-medium opacity-80 uppercase tracking-widest">Warkop Warga</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="switchTab('qr'); renderQRList()" class="btn bg-white/20 hover:bg-white/30 text-white font-bold backdrop-blur">
          <i data-lucide="qr-code" class="w-4 h-4 md:mr-2"></i> <span class="hidden md:inline">Cetak QR</span>
        </button>
        <button onclick="loadOrders()" class="btn bg-white/20 hover:bg-white/30 text-white font-bold backdrop-blur">
          <i data-lucide="refresh-cw" class="w-4 h-4 md:mr-2"></i> <span class="hidden md:inline">Refresh Data</span>
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Tabs -->
    <div class="flex gap-6 mb-6 border-b border-gray-300" id="tabs">
      <button onclick="switchTab('active')" id="tab-active" class="pb-3 border-b-4 font-black text-lg px-2 border-primary text-primary transition">ORDER AKTIF</button>
      <button onclick="switchTab('history')" id="tab-history" class="pb-3 border-b-4 font-bold text-lg px-2 border-transparent text-gray-400 hover:text-gray-600 transition">PEMBUKUAN</button>
    </div>

    <!-- Active Tab -->
    <div id="view-active">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
         <div class="card p-6 flex justify-between items-center shadow-sm border-l-4 border-l-red-500">
           <div>
             <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-1">Belum Dibayar</p>
             <p class="text-4xl font-black text-gray-800" id="stat-unpaid">0</p>
           </div>
           <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center">
             <i data-lucide="wallet" class="text-red-500 w-7 h-7"></i>
           </div>
         </div>
         <div class="card p-6 flex justify-between items-center shadow-sm border-l-4 border-l-green-500">
           <div>
             <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-1">Pendapatan Hari Ini</p>
             <p class="text-4xl font-black text-primary" id="stat-revenue">Rp 0</p>
           </div>
           <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center">
             <i data-lucide="check-circle-2" class="text-green-600 w-7 h-7"></i>
           </div>
         </div>
      </div>
      
      <div id="active-orders-list" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- QR Tab -->
    <div id="view-qr" class="hidden">
      <div class="card p-6 mb-6">
        <h2 class="text-xl font-black mb-4">Cetak QR Code Masing-Masing Meja</h2>
        
        <!-- Takeaway QR -->
        <div class="mb-8 p-6 bg-primary/5 rounded-xl text-center max-w-sm mx-auto border border-primary/20">
          <h3 class="font-bold flex items-center gap-2 justify-center mb-4"><i data-lucide="shopping-bag"></i> KASIR / TAKE AWAY</h3>
          <div class="bg-white p-4 inline-block rounded-lg shadow-sm border">
            <canvas id="qr-takeaway"></canvas>
          </div>
          <button onclick="downloadQR('takeaway', 'KASIR / TAKE AWAY')" class="btn btn-primary w-full mt-4 font-bold">
            <i data-lucide="download" class="w-4 h-4 mr-2"></i> Download QR
          </button>
        </div>

        <hr class="my-8 border-gray-200">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4">
          <h3 class="font-bold text-gray-800">QR Meja Pelanggan</h3>
          <div class="flex gap-2 mt-3 sm:mt-0 w-full sm:w-auto">
            <input type="text" id="input-manual-table" placeholder="Meja Baru (contoh: VIP)" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-full sm:w-auto outline-primary font-medium">
            <button onclick="addManualTable()" class="btn btn-primary text-sm font-bold shadow-sm whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4 md:mr-1"></i> <span class="hidden md:inline">Tambah</span></button>
          </div>
        </div>

        <!-- List Tables -->
        <div id="qr-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        </div>
      </div>
    </div>

    <!-- History Tab -->
    <div id="view-history" class="hidden">
      <div class="card mb-6 overflow-hidden">
        <div class="p-6 bg-white border-b-4 border-b-primary shadow-sm">
          <h2 class="text-xl font-black flex items-center gap-3 text-gray-800">
            <i data-lucide="book-open" class="text-primary"></i> 
            Riwayat Pembukuan Transaksi
          </h2>
        </div>
      </div>
      <div id="history-orders-list" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
